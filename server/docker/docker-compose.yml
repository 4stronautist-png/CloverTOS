services:
  db:
    image: mariadb:10.11
    container_name: clover-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: clover_local
      MARIADB_USER: melia
      MARIADB_PASSWORD: melia123
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - clover_db_data:/var/lib/mysql
      - ./db/init:/docker-entrypoint-initdb.d:ro

  server:
    build:
      context: ../..
      dockerfile: server/docker/Dockerfile
    container_name: clover-server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: melia
      DB_PASS: melia123
      DB_NAME: clover_local
      SERVER_NAME: Clover
      SERVER_NATION: GLOBAL
      GROUP_ID: 1001
      PUBLIC_HOST: 127.0.0.1
      INTER_HOST: 127.0.0.1
    ports:
      - "18080:8080"
      - "2000:2000"
      - "7001:7001"
      - "7002:7002"
      - "9001:9001"
      - "9002:9002"
    volumes:
      - ../runtime/logs:/opt/clover/server/app/logs

volumes:
  clover_db_data:
